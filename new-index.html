<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <title>NIL</title>
    <link rel="icon" href="./icon/icon.gif" type="image/x-icon"/>
    <script type="module" src="./assets/theme.js"></script>
    <script type="module" src="./nil.js"></script>
    <style>
        @font-face { font-family:PrimaryFont; src:url('./assets/FreeMono.woff'); }
        @font-face { font-family:BackupFont; src:url('./assets/NotoSansMonoVariable.ttf'); }
        :root { --size:calc(13px + ((1vw + 1vh) / 3)); }
        html 
        {
            scrollbar-color:var(--foregroundsecond) var(--backgroundsecond)
        }
        html *
        {
            font-family:PrimaryFont, BackupFont;
            font-size:var(--size);
            color:var(--foregroundsecond);
            background-color:var(--backgroundsecond);
        }
        body
        {
            display:grid;
            width:calc(100vw - 9ch);
            min-height:calc(100vh - 6ch);
            padding:3ch;
            margin:0;
            align-items:start;
            justify-content:center;
        }
    </style>
</head>
<body>
    <nil-instance placeholder="describe nil"></nil-instance>
</body>
