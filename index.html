<html>

    <meta charset="utf-8"/>

    <meta name="msapplication-TileColor" content="#da532c"/>
    <meta name="theme-color" content="#ffffff"/>
    <style>
      @font-face { font-family:MonoSpaced; src:url('./assets/FreeMono.woff'); }
      @font-face { font-family:BackupMono; src:url('./style/NotoSansMonoVariable.ttf'); }
      :root { --size:calc(13px + ((1vw + 1vh) / 2));}
      html{scrollbar-color:var(--foregroundsecond) var(--backgroundsecond);}
      html * {font-family:Monospaced, BackupMono;font-size:var(--size);user-select:none;color:var(--foregroundsecond);background-color:var(--backgroundsecond);}
      body {display:grid;width:calc(100vw - 3ch);grid-template-areas: 't' 'm';grid-template-rows: 3lh auto;touch-action:none;min-height:100vh;padding:0;margin:0;}
      header {grid-area:t;height:5lh;width:100%;display:flex;margin:auto;justify-content:flex-start;align-items:center;padding:1ch;border-radius:1ch;}
      header:hover{color:var(--foregroundsecond);background-color:var(--backgroundsecond);}
      main {grid-area:m;display:flex;flex-flow:column nowrap;justify-content:center;align-items:center;min-height:3lh;width:90vw;margin:auto;justify-self:center;padding-bottom:7lh;margin-bottom:auto;margin-top:7%;}
      nil-atom, nil-tab, nil-list, nil-break {display:inline-block;position:relative;vertical-align:top;min-width:1ch;line-height:1lh;min-height:1lh;padding:0;scroll-padding:7lh;scroll-margin:7lh;scroll-snap-align:center;z-index:1;background-color:unset;border-radius:0.3ch;}
      nil-atom, nil-tab{transition: all 0.2s;padding:0;white-space:pre;border-radius:0.3ch;background-color:unset;height:1lh;}
      nil-atom:empty, nil-tab:empty, nil-list:empty, nil-break{height:2ch ;width:1ch;}
      nil-atom:empty, nil-tab:empty{background-color:var(--backgroundthird);}
      nil-list > * + * {margin-left:1ch;}
      nil-break + *, * + nil-break {margin-left:0;}
      nil-list{border-radius:0.3ch;outline:0;line-height:2ch;}
      nil-list:has(> *[focused]){outline:solid 0.3ch var(--backgroundthird);}
      main > nil-list, main > nil-list[focused] {outline-style:none;background-color:unset;}
      main > nil-list:empty{outline:solid 0.3ch var(--backgroundthird);background-color:unset;}
      nil-break{display:inline;}
      *[focused]{background-color:var(--backgroundthird);z-index:2;}
      nil-break[focused]{color:var(--diminished);}
      nil-list > nil-list[focused] > nil-break{color:var(--diminished);}
      nil-list:empty[focused] {outline:solid 0.3ch var(--backgroundthird);background-color:unset;}
      nil-break[focused]::before{content:'↵';display:inline-block;position:absolute;line-height:2ch;width:1ch;height:2ch;background-color:var(--backgroundthird);color:var(--diminished);border-radius:0.2ch;box-shadow:0 0 0 0 var(--foregroundsecond);margin-left:1ch;outline:solid 0.3ch var(--backgroundthird);}
      #Options{position:absolute;display:block;z-index:100;min-width:7ch;min-height:3lh;border:solid var(--foreground) 0.2ch;border-radius:0.5ch;padding:0;}
      #Options > * {display:grid;text-align:center;align-items:center;justify-content:center;border-collapse:collapse;cursor:pointer;height:1.5lh;}
      #Options > * + * {border-top:solid var(--foreground) 0.2ch;}
      #Options > *:hover {background-color:var(--backgroundthird);}
      #Options > *:first-child {border-radius: 0.3ch 0.3ch 0 0;}
      #Options > *:last-child {border-radius: 0 0 0.3ch 0.3ch;}
      #Logo {height:5ch;width:5ch;z-index:100;cursor:pointer;}
      #Slideout {transition:left 0.5s;position:fixed;left:100vw;width:calc(100% - 9ch);display:flex;justify-content:space-between;}
      header:hover #Slideout{left:7ch;}
      #HelpButton{cursor:pointer;width:3ch;height:3ch;display:inline-grid;align-items:center;justify-content:center;text-align:center;border-radius:1ch;}
      #HelpButton:hover {background-color:var(--backgroundthird);}
    </style>
  </head>

    var Theme = 3
    function setColorTheme()
    {
      var index = Theme
      var c = colors[index]
      var r = document.querySelector(':root')
      r.style.setProperty('--background', c.bg_0)
      r.style.setProperty('--backgroundsecond', c.bg_1)
      r.style.setProperty('--backgroundthird', c.bg_2)
      r.style.setProperty('--diminished', c.dim_0)
      r.style.setProperty('--foreground', c.fg_0)
      r.style.setProperty('--foregroundsecond', c.fg_1)
      r.style.setProperty('--red', c.red)
      r.style.setProperty('--green', c.green)
      r.style.setProperty('--yellow', c.yellow)
      r.style.setProperty('--blue', c.blue)
      r.style.setProperty('--magenta', c.magenta)
      r.style.setProperty('--cyan', c.cyan)
      r.style.setProperty('--orange', c.orange)
      r.style.setProperty('--violet', c.violet)
      r.style.setProperty('--brightred', r.br_red)
      r.style.setProperty('--brightgreen', c.br_green)
      r.style.setProperty('--brightyellow', c.br_yellow)
      r.style.setProperty('--brightblue', c.br_blue)
      r.style.setProperty('--brightmagenta', c.br_magenta)
      r.style.setProperty('--brightcyan', c.br_cyan)
      r.style.setProperty('--brightorange', c.br_orange)
      r.style.setProperty('--brightviolet', c.br_violet)
      r.style.setProperty('--hgl', c.dim_0 + '40')
      if (Theme == 0 || Theme == 1)
      {
        r.style.setProperty('--shadow', c.bg_0)
      }
      else
      {
        r.style.setProperty('--shadow', c.fg_1)
      }
      Theme = (Theme + 1) % 4
    }
    setColorTheme(Theme);
    window['NIL'] = 
    {
      editor : 
      {
        element : undefined,
        model : undefined,
        /*
        tree of [<type>, <parent>, <data>]
        */

          ",eta" : 'η',
          ",Theta" : 'Θ',
          ",theta" : 'θ',
          ",Iota" : 'Ι',
          ",iota" : 'ι',
          ",Kappa" : 'Κ',
          ",kappa" : 'κ',
          ",Lambda" : 'Λ',
          ",lambda" : 'λ',
          ",Mu" : 'Μ',
          ",mu" : 'μ',
          ",Nu" : 'Ν',
          ",nu" : 'ν',
          ",Xi" : 'Ξ',
          ",xi" : 'ξ',
          ",Omicron" : 'Ο',
          ",omicron" : 'ο',
          ",Pi" : 'Π',
          ",pi" : 'π',
          ",Rho" : 'Ρ',
          ",rho" : 'ρ',
          ",Sigma" : 'Σ',
          ",sigma" : 'σ',
          ",sigma-alt" : 'ς',
          ",Tau" : 'Τ',
          ",tau" : 'τ',
          ",Upsilon" : 'Υ',
          ",upsilon" : 'υ',
          ",Phi" : 'Φ',
          ",phi" : 'φ',
          ",Chi" : 'Χ',
          ",chi" : 'χ',
          ",Psi" : 'Ψ',
          ",psi" : 'ψ',
          ",Omega" : 'Ω',
          ",omega" : 'ω',
        },
        makeAtom : function(type, parent, previous, next, data)
        {
          return {  type: type,
                    parent: parent,
                    previous: previous,
                    next: next,
                    data: data
                 }
        },
        focus : function(atom)
        {
          if (atom)
          {
            if (this.cursor.type == "atom")
            {
              if (this.sequences[this.cursor.data])
              {
                this.cursor.data = this.sequences[this.cursor.data]
              }
            }
            this.cursor = atom
          }
          if (this.model == undefined)
          {
            this.model = this.makeAtom(undefined, undefined, undefined, undefined, undefined)
            this.model.next = this.model
            this.model.previous = this.model
            this.cursor = this.model
          }
          return this.cursor
        },
        insertAtom : function()
        {
          var atom = this.focus()
          if (atom.type == undefined)
          {
            atom.type = "list"
          }
          else if (atom.type == "list" && atom.data == undefined)
          {
            atom.data = this.makeAtom(undefined, atom, undefined, undefined, undefined)
            atom.data.next = atom.data
            atom.data.previous = atom.data
            this.focus(atom.data)
          }
          else
          {
            if (atom.parent != undefined)
            {
              atom.next = this.makeAtom(undefined, atom.parent, atom, atom.next, undefined)
              atom.next.previous = atom
              atom.next.next.previous = atom.next
            }
            this.focus(atom.next)
          }
        },
        appendCharacter : function(character)
        {
          var atom = this.focus()
          if (atom.type == undefined)
          {
            atom.type = "atom"
            atom.data = ""
          }
          else if (atom.type == "break" || atom.type == "tab")
          {
            this.insertAtom()
            this.focus().type = "atom"
            this.focus().data = ""
          }
          else if (atom.type == "list")
          {
            if (atom.data == undefined)
            {
              atom.data = this.makeAtom("atom", atom, undefined, undefined, "")
              atom.data.next = atom.data
              atom.data.previous = atom.data
              this.focus(atom.data)
            }
            else
            {
              this.insertAtom()
              this.focus().type = "atom"
              this.focus().data = ""
            }
          }
          this.focus().data = this.focus().data + character
        },
        deleteCharacter : function()
        {
          var atom = this.focus()
          if (atom.type == "atom" || atom.type == "tab")
          {
            if (atom.data.length > 0)
            {
              atom.data = atom.data.slice(0, atom.data.length - 1)
              if (atom.data.length == 0)
              {
                atom.type = undefined
                atom.data = undefined
              }
            }
            else
            {
              this.deleteAtom()
            }
          }
          else
          {
            this.deleteAtom()
          }
        },
        deleteAtom : function()
        {
          var atom = this.focus()
          if (atom.next === atom.previous && atom.previous === atom && atom === atom.next)
          {
            if (atom.parent != undefined)
            {
              this.focus(atom.parent)
              this.focus().data = undefined
            }
            else
            {
              this.model = undefined
              this.cursor = undefined
            }
          }
          else
          {
            atom.previous.next = atom.next
            atom.next.previous = atom.previous
            if (atom.parent.data === atom)
            {
              atom.parent.data = atom.next
              this.focus(atom.next)
            }
            else
            {
              this.focus(atom.previous)
            }
          }
        },
        insertBreak : function()
        {
          if (this.focus().parent != undefined)
          {
            this.insertAtom()
            this.focus().type = "break"
          }
          else 
          {
            this.submit()
          }
        },
        insertTab : function()
        {
          if (this.focus().type == "tab")
          {
            this.focus().data = this.focus().data + " "
          }
          else
          {
            this.insertAtom()
            this.focus().type = "tab"
            this.focus().data = " "
          }
        },
        moveCursorForward : function()
        {
          this.focus(this.focus().next)
        },
        moveCursorBackward : function()
        {
          this.focus(this.focus().previous)
        },
        moveCursorInward : function()
        {
          if (this.focus().type == "list")
          {
            if (this.focus().data != undefined)
            {
              this.focus(this.focus().data)
            }
          }
        },
        moveCursorOutward : function()
        {
          if (this.focus().parent != undefined)
          {
            this.focus(this.focus().parent)
          }
        },
        sampleAtom : function()
        {
          this.sample = structuredClone(this.focus())
        },
        putAtom : function()
        {
          this.sample.next = this.focus().next
          this.sample.previous = this.focus()
          this.focus().next.previous = this.sample
          this.focus().next = this.sample
          this.sample.parent = this.focus().parent
          this.sample = undefined
        },
        spreadAtom : function()
        {
          if (this.sample.type == "list")
          {
            var head = this.sample.data
            var tail = this.sample.data.previous
            var x = head
            do 
            {
              x.parent = this.focus().parent
              x = x.next
            } while (x != tail)
            tail.next = this.focus().next
            head.previous = this.focus()
            this.focus().next.previous = tail
            this.focus().next = head
            this.sample = undefined
          }
          else 
          {
            this.putAtom()
          }
        },
        showModel : function()
        {
          const display = function(n)
          {
            var element = undefined
            if (n === undefined)
            {
              return undefined
            }
            switch(n.type)
            {
              case undefined:
                element = document.createElement('nil-atom')
                break;
              case "atom":
                element = document.createElement('nil-atom')
                element.appendChild(document.createTextNode(n.data))
                element.style.cursor = "pointer"
                element.onclick = (e) => {
                  const atom = n
                  window.NIL.editor.focus(atom)
                  window.NIL.editor.showModel()
                }
                break;
              case "tab":
                element = document.createElement('nil-tab')
                element.appendChild(document.createTextNode(n.data))
                element.style.cursor = "pointer"
                element.onclick = (e) => {
                  const atom = n
                  window.NIL.editor.focus(atom)
                  window.NIL.editor.showModel()
                }
                break;
              case "break":
                element = document.createElement('nil-break')
                //element.appendChild(document.createTextNode('\u21b5'))
                element.appendChild(document.createTextNode(''))
                element.appendChild(document.createElement('br'))
                break;
              case "list":
                element = document.createElement('nil-list')
                if (n.data != undefined)
                {
                  var x = n.data
                  do
                  {
                    element.appendChild(display(x))
                    x = x.next
                  }
                  while (x != n.data)
                }
                break;
            }
            if (window.NIL.editor.focus() === n)
            {
              element.setAttribute("focused", "true")
              element.id = "FocusedAtom"
            }
            return element
          }
          var tree = display(this.model)
          if (tree == undefined) tree = document.createElement('p')
          this.element.firstChild.replaceWith(tree)
          //window.scrollTo(FocusedAtom.offsetLeft, FocusedAtom.offsetTop)
          if (document.getElementById("FocusedAtom"))
          {
            FocusedAtom.scrollIntoView(true)
          }
        },
        processCommand : function(edit, input)
        {
          if (edit)
          {
            switch(input)
            {
              case 'Space':
                this.insertAtom()
                break;
              case 'Enter':
                this.insertBreak()
                break;
              case 'Tab':
                this.insertTab()
                break;
              case 'Backspace':
                this.deleteCharacter()
                break;
              case 'Up':
                this.moveCursorOutward()
                break;
              case 'Down':
                this.moveCursorInward()
                break;
              case 'Left':
                this.moveCursorBackward()
                break;
              case 'Right':
                this.moveCursorForward()
                break;
              case 'Sample':
                this.sampleAtom()
                break;
              case 'Put':
                this.putAtom()
                break;
              case 'Spread':
                this.spreadAtom()
                break;
            }
          }
          else
          {
            this.appendCharacter(input)
          }
          this.showModel()
        },
        submit : function()
        {
          const serialize = (n) => 
          {
            var atom = undefined
            switch(n.type)
            {
              case "atom":
                return n.data
                break;
              case "list":
                var atom = []
                var a = n.data
                do
                {
                  var result = serialize(a)
                  if (result != undefined)
                  {
                    atom.push(result)
                  }
                  a = a.next
                } while(a != n.data)
                return atom
                break;
              default:
                return undefined
            }
          }
          var src = serialize(this.model)
          window.NIL.interpreter.submit(src)
        }
      },
      interpreter : 
      {
        submit : function(src)
        {

        },
        eval : function(n)
        {
          const primitives = 
          {
            "?" : function () {},
            "'" : function () {},
            "function" : function () {},
            "let" : function () {},
            "do" : function () {},
            "=" : function () {},
            
          }
        }
      },
      Init(element)
      {
        this.editor.element = element
        var t = document.createElement("textarea")
        t.id = "nil-editor"
        t.autocapitalize = "false"
        t.autocomplete = "off"
        t.spellcheck = "false"
        t.style.resize = "none"
        t.style.overflow = "auto"
        t.style.position = "absolute"
        t.style.left = "-100vw"
        t.style.top = "-100vh"
        t.oninput = function(e)
        {
          e.preventDefault()
          t.value = "##\n##\n##"
          t.selectionEnd = 4
          t.selectionStart = 4
          switch(e.inputType)
          {
            case 'insertText':
            case 'insertCompositionText':
              if (e.data != ' ')
              {
                window.NIL.editor.processCommand(false, e.data)
              }
              else
              {
                window.NIL.editor.processCommand(true, "Space")
              }
              break;
            case 'deleteContentBackward':
              window.NIL.editor.processCommand(true, "Backspace")
              break;
            case 'insertLineBreak':
              window.NIL.editor.processCommand(true, "Enter")
              break;
          }
        }
        //t.onselectionchange = function(e)
        //{
        //  t.selectionEnd = 4
        //  t.selectionStart = 4
        //}
        this.editor.element.appendChild(t)
        t.focus()
        t.click()

        document.body.onclick = function(e)
        {
          t.focus()
          t.click()
          e.preventDefault()
        }
        document.body.onpointerdown = function(e)
        {
          e.preventDefault()
          const DragData = {x : e.clientX, y : e.clientY}
          const DragDetection = function(e)
          {
            var vdim = Math.floor(window.screen.height / 20)
            var wdim = Math.floor(window.screen.width / 13)
            var vertical = e.clientY - DragData.y
            var horizontal = e.clientX - DragData.x
            if (vertical > vdim)
            {
              if (navigator.vibrate) {navigator.vibrate(10)}
              DragData.y = e.clientY
              window.NIL.editor.processCommand(true, "Down")
            }
            else if (vertical < 0 && Math.abs(vertical) > vdim)
            {
              if (navigator.vibrate) {navigator.vibrate(10)}
              DragData.y = e.clientY
              window.NIL.editor.processCommand(true, "Up")
            }
            if (horizontal > wdim)
            {
              if (navigator.vibrate) {navigator.vibrate(10)}
              DragData.x = e.clientX
              window.NIL.editor.processCommand(true, "Right")
            }
            else if (horizontal < 0 && Math.abs(horizontal) > wdim)
            {
              if (navigator.vibrate) {navigator.vibrate(10)}
              DragData.x = e.clientX
              window.NIL.editor.processCommand(true, "Left")
            }
            
          }
          document.body.addEventListener("pointermove", DragDetection)
          const DragDetectionOff = function(e)
          {
            document.body.removeEventListener("pointermove", DragDetection)
            document.body.removeEventListener("pointerup", DragDetectionOff)
            document.body.removeEventListener("pointercancel", DragDetectionOff)
          }
          document.body.addEventListener("pointerup", DragDetectionOff)
          document.body.addEventListener("pointercancel", DragDetectionOff)
        }
        document.body.onpointerup = function(e)
        {
          e.preventDefault()
        }
        document.body.onpointermove = function(e)
        {
          e.preventDefault()
        }
        document.body.oncontextmenu = function(e)
        {
          e.preventDefault()
          if (document.getElementById("Options"))
          {
            return;
          }
          if (window.NIL.editor.cursor != undefined)
          {
            var atom = document.getElementById('FocusedAtom').getBoundingClientRect()
            var menu = document.createElement('div')
            menu.id = "Options"
            menu.appendChild(document.createElement('div'))
            menu.lastChild.appendChild(document.createTextNode('\u29c9'))
            menu.lastChild.onclick = function(e)
            {
              window.NIL.editor.processCommand(true, "Sample")
              menu.remove()
            }
            menu.appendChild(document.createElement('div'))
            menu.lastChild.appendChild(document.createTextNode('\u2193'))
            menu.lastChild.onclick = function(e)
            {
              window.NIL.editor.processCommand(true, "Put")
              menu.remove()
            }
            menu.appendChild(document.createElement('div'))
            menu.lastChild.appendChild(document.createTextNode('\u21e3'))
            menu.lastChild.onclick = function(e)
            {
              window.NIL.editor.processCommand(true, "Spread")
              menu.remove()
            }
            menu.style.position = "fixed"
            document.body.appendChild(menu)
            menu.style.top = "" + (e.y - 5) + "px"
            menu.style.left = "" + (e.x - 5) + "px"
            menu.onpointerleave = function(e)
            {
              menu.remove()
            }
          }
        }
        document.body.onkeydown = function(e)
        {
          switch(e.key)
          {
            case 'ArrowLeft':
              window.NIL.editor.processCommand(true, "Left")
              e.preventDefault()
              break;
            case 'ArrowRight':
              window.NIL.editor.processCommand(true, "Right")
              e.preventDefault()
              break;
            case 'ArrowUp':
              window.NIL.editor.processCommand(true, "Up")
              e.preventDefault()
              break;
            case 'ArrowDown':
              window.NIL.editor.processCommand(true, "Down")
              e.preventDefault()
              break;
            case 'Enter':
              if (e.ctrlKey)
              {
                window.NIL.editor.processCommand(true, "Down")
                e.preventDefault()
              }
              else
              {
                window.NIL.editor.processCommand(true, "Enter")
                e.preventDefault()
              }
              break;
            case 'Tab':
              e.preventDefault()
              window.NIL.editor.processCommand(true, "Tab")
              break;
            case 'Backspace':
              e.preventDefault()
              window.NIL.editor.processCommand(true, "Backspace")
              break;
            case ' ':
              e.preventDefault()
              if (e.ctrlKey)
              {
                window.NIL.editor.processCommand(true, "Up")
              }
              else
              {
                window.NIL.editor.processCommand(true, "Space")
              }
              break;
          }
        }
        document.body.onkeyup = function(e)
        {
          undefined
        }
      }
    }
    window.NIL.Init(document.getElementById("NIL"))
    function ShowHelp(e)
    {
      e.preventDefault()
    }
  </script>
